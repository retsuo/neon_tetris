<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Master Pro</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00de; --gold: #ffd700; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        .header { width: 100%; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .league-badge { padding: 4px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 8px var(--gold); }
        .stats-bar { width: 90%; display: flex; justify-content: space-between; padding: 10px; font-weight: 900; font-size: 20px; text-shadow: 0 0 10px var(--neon); }

        #game-container { position: relative; width: 240px; height: 400px; border: 2px solid #222; border-radius: 15px; background: #050505; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
        canvas { width: 100%; height: 100%; border-radius: 13px; }

        #leaderboard { width: 240px; margin-top: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; border: 1px solid #222; }
        .leader-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        .t-gold { color: var(--gold); text-shadow: 0 0 5px var(--gold); }

        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 13px; padding: 20px; text-align: center; }
        h2 { color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 0 0 15px; font-size: 28px; }
        input { background: #111; border: 2px solid var(--neon); border-radius: 10px; color: #fff; padding: 12px; width: 90%; text-align: center; font-size: 18px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        
        .btn-main { background: linear-gradient(180deg, var(--gold), #b8860b); border: none; padding: 15px 40px; border-radius: 30px; color: #000; font-weight: 900; font-size: 20px; box-shadow: 0 5px 20px rgba(212,175,55,0.4); cursor: pointer; }
        .btn-main:active { transform: scale(0.95); }

        .controls { display: grid; grid-template-columns: repeat(3, 70px); gap: 15px; padding: 20px 0; }
        .btn-joy { width: 70px; height: 70px; background: #111; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; box-shadow: 0 4px 0 #000; }
        .btn-joy:active { transform: translateY(2px); border-color: var(--neon); color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        .btn-rot { border-color: var(--pink); color: var(--pink); grid-column: 2; }
    </style>
</head>
<body>

<div class="header">
    <div class="league-badge">BRONZE LEAGUE</div>
    <div class="stats-bar">
        <div>SCORE: <span id="ui-score">0</span></div>
        <div style="color: var(--gold)">BEST: <span id="ui-best">0</span></div>
    </div>
</div>

<div id="game-container">
    <div id="overlay">
        <h2 id="ov-title">NEON MASTER</h2>
        <div id="name-box">
            <p style="color: #888; font-size: 13px;">Введи ник ОДИН РАЗ для рейтинга:</p>
            <input type="text" id="nick-input" placeholder="Твой ник" maxlength="10">
        </div>
        <button class="btn-main" onclick="startGame()">ИГРАТЬ</button>
    </div>
    <canvas id="game"></canvas>
</div>

<div id="leaderboard">
    <div style="text-align:center; color:var(--neon); margin-bottom:8px; font-weight:bold; font-size:14px;">TOP PLAYERS</div>
    <div id="leader-list"></div>
</div>

<div class="controls">
    <div class="btn-joy btn-rot" id="m-rot">↻</div>
    <div class="btn-joy" style="grid-row:2" id="m-l">←</div>
    <div class="btn-joy" style="grid-row:2" id="m-d">↓</div>
    <div class="btn-joy" style="grid-row:2" id="m-r">→</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAiEnX5enxq-1PX3smDt0pguY7AqFLUB4I",
        databaseURL: "https://retsuo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "retsuo"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveScore = (n, s) => { set(ref(db, 'leaderboard/' + n), { score: s }); };

    onValue(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(5)), (snap) => {
        const list = document.getElementById('leader-list');
        list.innerHTML = "";
        let players = [];
        snap.forEach(c => { players.push({n: c.key, s: c.val().score}); });
        players.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="leader-row ${i==0?'t-gold':''}"><span>${i+1}. ${p.n}</span><span>${p.s}</span></div>`;
        });
    });
</script>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.scale(20, 20);

    const arena = Array.from({length: 20}, () => Array(12).fill(0));
    const colors = [null, '#00f2ff', '#ff00de', '#00ff00', '#ffff00', '#ff0000', '#7a00ff', '#ff7a00'];
    let score = 0, best = 0, active = false, myName = localStorage.getItem('neon_name') || "";

    // Прячем ввод ника, если он уже есть в памяти
    if (myName) document.getElementById('name-box').style.display = 'none';

    function startGame() {
        if (!myName) {
            const val = document.getElementById('nick-input').value.trim();
            if (!val) return alert("Введи ник!");
            myName = val;
            localStorage.setItem('neon_name', myName);
            document.getElementById('name-box').style.display = 'none';
        }
        arena.forEach(r => r.fill(0));
        score = 0;
        document.getElementById('ui-score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        active = true;
        resetPlayer();
        update();
    }

    const player = { pos: {x: 0, y: 0}, matrix: null };

    function createPiece(t) {
        if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (t === 'T') return [[0,2,0],[2,2,2],[0,0,0]];
        if (t === 'O') return [[3,3],[3,3]];
        if (t === 'L') return [[0,4,0],[0,4,0],[0,4,4]];
        if (t === 'J') return [[0,5,0],[0,5,0],[5,5,0]];
        if (t === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        return [[7,7,0],[0,7,7],[0,0,0]];
    }

    function collide(fArena, fPlayer) {
        const [m, o] = [fPlayer.matrix, fPlayer.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (fArena[y + o.y] && fArena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(fArena, fPlayer) {
        fPlayer.matrix.forEach((row, y) => {
            row.forEach((v, x) => { if (v) fArena[y + fPlayer.pos.y][x + fPlayer.pos.x] = v; });
        });
    }

    function resetPlayer() {
        const pcs = 'ILJOTSZ';
        player.matrix = createPiece(pcs[Math.floor(Math.random() * pcs.length)]);
        player.pos.y = 0;
        player.pos.x = Math.floor(arena[0].length / 2) - Math.floor(player.matrix[0].length / 2);
        if (collide(arena, player)) {
            active = false;
            if (score > best) best = score;
            document.getElementById('ui-best').innerText = best;
            document.getElementById('ov-title').innerText = "SCORE: " + score;
            document.getElementById('overlay').style.display = 'flex';
            if (window.saveScore) window.saveScore(myName, score);
        }
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            score += 100;
            y++;
        }
        document.getElementById('ui-score').innerText = score;
    }

    let lastTime = 0, dropCounter = 0;
    function update(time = 0) {
        if (!active) return;
        const dt = time - lastTime; lastTime = time;
        dropCounter += dt;
        if (dropCounter > 800) { 
            player.pos.y++;
            if (collide(arena, player)) { player.pos.y--; merge(arena, player); resetPlayer(); arenaSweep(); }
            dropCounter = 0;
        }
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, 12, 20);
        const drawM = (m, o) => {
            m.forEach((r, y) => r.forEach((v, x) => {
                if (v) {
                    ctx.fillStyle = colors[v];
                    ctx.fillRect(x + o.x, y + o.y, 0.9, 0.9);
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(x + o.x + 0.1, y + o.y + 0.1, 0.3, 0.1);
                }
            }));
        };
        drawM(arena, {x:0, y:0});
        drawM(player.matrix, player.pos);
    }

    const ctrl = (id, f) => { document.getElementById(id).onpointerdown = (e) => { e.preventDefault(); f(); }};
    ctrl('m-l', () => { player.pos.x--; if(collide(arena, player)) player.pos.x++; });
    ctrl('m-r', () => { player.pos.x++; if(collide(arena, player)) player.pos.x--; });
    ctrl('m-d', () => { player.pos.y++; if(collide(arena, player)) { player.pos.y--; merge(arena, player); resetPlayer(); arenaSweep(); }});
    ctrl('m-rot', () => {
        const m = player.matrix;
        for (let y = 0; y < m.length; ++y) for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        m.forEach(r => r.reverse());
        if (collide(arena, player)) { m.forEach(r => r.reverse()); for (let y = 0; y < m.length; ++y) for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; }
    });
</script>
</body>
</html>
