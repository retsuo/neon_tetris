<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troll Game TWA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            touch-action: none; /* Запрещаем скролл экрана при игре */
        }
        canvas {
            background-color: #f0f0f0;
            border: 2px solid #555;
            border-radius: 10px;
            max-width: 100%;
        }
        #ui { margin-bottom: 15px; font-size: 24px; font-weight: bold; }
        
        /* Кнопки управления для телефона */
        #controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .control-btn {
            background-color: #444;
            color: white;
            border: none;
            border-radius: 15px;
            width: 70px;
            height: 70px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .control-btn:active { background-color: #666; }
    </style>
</head>
<body>

    <div id="ui">Уровень: <span id="level-display">1</span></div>
    
    <canvas id="gameCanvas" width="350" height="400"></canvas>
    
    <div id="controls">
        <div class="control-btn" id="btnLeft">⬅️</div>
        <div class="control-btn" id="btnJump">⬆️</div>
        <div class="control-btn" id="btnRight">➡️</div>
    </div>

    <script>
        // Инициализация Telegram
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand(); // Открываем на весь экран
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisplay = document.getElementById('level-display');

        // Состояние игры
        let currentLevel = 0;
        let gameOver = false;

        // Игрок (синий квадрат)
        const player = { x: 20, y: 300, width: 20, height: 20, vx: 0, vy: 0, speed: 4, jumpPower: -9, grounded: false };
        const gravity = 0.5;
        
        // Управление
        const keys = { left: false, right: false, jump: false };

        // Настройка кнопок для телефона и ПК
        const setupButton = (id, action) => {
            const btn = document.getElementById(id);
            // Для сенсорных экранов
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[action] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[action] = false; });
            // Для мышки на ПК
            btn.addEventListener('mousedown', () => keys[action] = true);
            btn.addEventListener('mouseup', () => keys[action] = false);
        };

        setupButton('btnLeft', 'left');
        setupButton('btnRight', 'right');
        setupButton('btnJump', 'jump');

        // Управление с клавиатуры (если играют с компьютера)
        window.addEventListener('keydown', e => {
            if(e.code === 'ArrowLeft') keys.left = true;
            if(e.code === 'ArrowRight') keys.right = true;
            if(e.code === 'ArrowUp') keys.jump = true;
        });
        window.addEventListener('keyup', e => {
            if(e.code === 'ArrowLeft') keys.left = false;
            if(e.code === 'ArrowRight') keys.right = false;
            if(e.code === 'ArrowUp') keys.jump = false;
        });

        // ----------------------------------------------------
        // БАЗА УРОВНЕЙ (Здесь ты можешь добавить свои 10 штук)
        // ----------------------------------------------------
        const levels = [
            { // Уровень 1: Простой
                start: { x: 20, y: 300 },
                goal: { x: 300, y: 320, width: 30, height: 40 }, // Зеленая дверь
                platforms: [
                    { x: 0, y: 360, width: 350, height: 40, type: 'solid' } // Земля
                ],
                spikes: []
            },
            { // Уровень 2: Троллинг - проваливающийся пол
                start: { x: 20, y: 300 },
                goal: { x: 300, y: 320, width: 30, height: 40 },
                platforms: [
                    { x: 0, y: 360, width: 100, height: 40, type: 'solid' },
                    { x: 100, y: 360, width: 100, height: 40, type: 'fake' }, // ФЕЙКОВЫЙ ПОЛ! Он пропадет
                    { x: 200, y: 360, width: 150, height: 40, type: 'solid' }
                ],
                spikes: []
            },
            { // Уровень 3: Шипы
                start: { x: 20, y: 150 },
                goal: { x: 300, y: 70, width: 30, height: 40 },
                platforms: [
                    { x: 0, y: 200, width: 100, height: 20, type: 'solid' },
                    { x: 150, y: 150, width: 50, height: 20, type: 'solid' }, // Островок
                    { x: 250, y: 110, width: 100, height: 20, type: 'solid' }
                ],
                spikes: [
                    { x: 0, y: 380, width: 350, height: 20 } // Шипы внизу (Красные)
                ]
            }
        ];

        let activeLevel;

        function loadLevel(index) {
            if (index >= levels.length) {
                alert("🎉 Поздравляю! Ты прошел игру!");
                index = 0; // Начинаем заново
            }
            currentLevel = index;
            levelDisplay.innerText = currentLevel + 1;
            
            // Глубокое копирование уровня, чтобы фейковые платформы восстанавливались
            activeLevel = JSON.parse(JSON.stringify(levels[currentLevel])); 
            
            player.x = activeLevel.start.x;
            player.y = activeLevel.start.y;
            player.vx = 0;
            player.vy = 0;
            gameOver = false;
        }

        function die() {
            if (gameOver) return;
            gameOver = true;
            setTimeout(() => loadLevel(currentLevel), 300); // Рестарт через 0.3 сек
        }

        function update() {
            if (gameOver) return;

            // Движение влево/вправо
            if (keys.left) player.vx = -player.speed;
            else if (keys.right) player.vx = player.speed;
            else player.vx = 0;

            // Прыжок
            if (keys.jump && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Гравитация
            player.vy += gravity;
            player.x += player.vx;
            player.y += player.vy;

            player.grounded = false;

            // Ограничение по краям экрана (чтобы не уходил за стенки)
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Столкновения с платформами
            activeLevel.platforms.forEach(p => {
                if (!p.hidden && player.x < p.x + p.width && player.x + player.width > p.x &&
                    player.y < p.y + p.height && player.y + player.height > p.y) {
                    
                    if (p.type === 'fake') {
                        p.hidden = true; // Троллинг: пол пропадает!
                    } else {
                        // Столкновение сверху (приземление)
                        if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 10) {
                            player.y = p.y - player.height;
                            player.vy = 0;
                            player.grounded = true;
                        }
                    }
                }
            });

            // Столкновения с шипами
            activeLevel.spikes.forEach(s => {
                if (player.x < s.x + s.width && player.x + player.width > s.x &&
                    player.y < s.y + s.height && player.y + player.height > s.y) {
                    die();
                }
            });

            // Падение в пропасть
            if (player.y > canvas.height) {
                die();
            }

            // Переход на следующий уровень (Зеленая зона)
            const g = activeLevel.goal;
            if (player.x < g.x + g.width && player.x + player.width > g.x &&
                player.y < g.y + g.height && player.y + player.height > g.y) {
                loadLevel(currentLevel + 1);
            }
        }

        function draw() {
            // Очищаем экран
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем платформы (Серые)
            ctx.fillStyle = '#333';
            activeLevel.platforms.forEach(p => {
                if (!p.hidden) ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // Рисуем шипы (Красные)
            ctx.fillStyle = 'red';
            activeLevel.spikes.forEach(s => {
                ctx.fillRect(s.x, s.y, s.width, s.height);
            });

            // Рисуем финиш (Зеленый)
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(activeLevel.goal.x, activeLevel.goal.y, activeLevel.goal.width, activeLevel.goal.height);

            // Рисуем игрока (Синий)
            ctx.fillStyle = '#2196F3';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Запускаем следующий кадр
            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        // Старт игры
        loadLevel(0);
        draw();
    </script>
</body>
</html>
