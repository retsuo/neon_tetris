<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Gravity Glitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --pink: #ff00de; --bg: #030305; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Orbitron', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; height: 100vh;
        }

        /* UI Панель */
        .hud { 
            display: flex; justify-content: space-between; padding: 20px; 
            background: rgba(0,0,0,0.5); z-index: 10; backdrop-filter: blur(5px);
        }
        .score-box { text-shadow: 0 0 10px var(--neon); font-size: 20px; }

        /* Игровая зона */
        #game-container { flex: 1; position: relative; overflow: hidden; perspective: 500px; }
        canvas { display: block; }

        /* Эффект Глитча при проигрыше */
        .overlay { 
            position: absolute; inset: 0; background: rgba(255, 0, 222, 0.2); 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 100; backdrop-filter: blur(10px);
        }
        .btn-start { 
            background: var(--neon); border: none; padding: 20px 50px; 
            border-radius: 50px; font-family: 'Orbitron'; font-weight: 900;
            box-shadow: 0 0 30px var(--neon); cursor: pointer;
        }

        /* Тач-зона */
        .touch-zone { 
            position: absolute; inset: 0; z-index: 5; 
        }
    </style>
</head>
<body>

<div class="hud">
    <div class="score-box">SCORE: <span id="score">0</span></div>
    <div style="color: var(--pink)">BEST: <span id="best">0</span></div>
</div>

<div id="game-container">
    <div class="touch-zone" id="tap-area"></div>
    <canvas id="canvas"></canvas>
    
    <div id="menu" class="overlay" style="display: flex;">
        <h1 style="font-size: 40px; margin-bottom: 30px; text-align: center;">GRAVITY<br><span style="color:var(--neon)">GLITCH</span></h1>
        <button class="btn-start" onclick="startGame()">START MISSION</button>
        <p style="margin-top: 20px; font-size: 10px; opacity: 0.5;">TAP TO FLIP GRAVITY</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://retsuo-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    let score = 0;
    let best = localStorage.getItem('glitch_best') || 0;
    bestEl.innerText = best;

    let gameActive = false;
    let gravity = 1; // 1 - вниз, -1 - вверх
    let gameSpeed = 5;

    // Параметры игрока
    const player = {
        x: 50, y: 0, w: 30, h: 30,
        targetY: 0,
        color: '#00f2ff'
    };

    let obstacles = [];
    let particles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 80;
        player.y = canvas.height - 70;
        player.targetY = player.y;
    }
    window.addEventListener('resize', resize);
    resize();

    window.startGame = () => {
        document.getElementById('menu').style.display = 'none';
        score = 0;
        gameSpeed = 5;
        obstacles = [];
        gameActive = true;
        animate();
    };

    document.getElementById('tap-area').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(!gameActive) return;
        gravity *= -1;
        player.targetY = gravity === 1 ? canvas.height - 70 : 40;
    });

    function spawnObstacle() {
        const h = 60 + Math.random() * 100;
        const isTop = Math.random() > 0.5;
        obstacles.push({
            x: canvas.width + 50,
            y: isTop ? 0 : canvas.height - h,
            w: 40,
            h: h,
            color: Math.random() > 0.5 ? '#ff00de' : '#ffd700'
        });
    }

    let spawnTimer = 0;

    function animate() {
        if(!gameActive) return;
        ctx.fillStyle = 'rgba(3, 3, 5, 0.2)'; // Эффект шлейфа
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Плавное движение игрока
        player.y += (player.targetY - player.y) * 0.2;

        // Рисуем игрока с неоновым свечением
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.shadowBlur = 0;

        // Препятствия
        spawnTimer++;
        if(spawnTimer > Math.max(20, 60 - gameSpeed)) {
            spawnObstacle();
            spawnTimer = 0;
            score++;
            scoreEl.innerText = score;
            gameSpeed += 0.05;
        }

        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);

            // Коллизия
            if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                gameOver();
            }

            if(obs.x < -50) obstacles.splice(index, 1);
        });

        requestAnimationFrame(animate);
    }

    function gameOver() {
        gameActive = false;
        if(score > best) {
            best = score;
            localStorage.setItem('glitch_best', best);
            bestEl.innerText = best;
            // Сохраняем в твой Firebase
            set(ref(db, 'leaderboard/Abdrakhman'), { score: best });
        }
        document.getElementById('menu').style.display = 'flex';
    }
</script>
</body>
</html>
