<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Quest: Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00f2ff; --pink: #ff00de; --gold: #ffd700; --red: #ff3e3e;
            --bg: #050508; --panel: rgba(20, 20, 27, 0.9);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        /* HEADER */
        .top-bar { 
            display: flex; justify-content: space-around; padding: 15px; 
            background: var(--panel); border-bottom: 1px solid #333; z-index: 100;
        }
        .res-item { display: flex; align-items: center; gap: 8px; font-family: 'Orbitron', sans-serif; font-size: 14px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }

        /* GAME WORLD */
        #world { 
            flex: 1; position: relative; height: 60vh;
            background: linear-gradient(to bottom, #050508 0%, #1a1a2e 100%);
            overflow: hidden; border-bottom: 2px solid #222;
        }
        
        /* Стили персонажей */
        .entity { position: absolute; bottom: 80px; transition: 0.2s; background-size: contain; background-repeat: no-repeat; }
        #player { 
            left: 50px; width: 100px; height: 130px; 
            background-image: url('https://cdn-icons-png.flaticon.com/512/4333/4333609.png');
            filter: drop-shadow(0 0 15px var(--neon));
        }
        .enemy { 
            right: -100px; width: 80px; height: 110px; 
            background-image: url('https://cdn-icons-png.flaticon.com/512/1162/1162456.png');
            filter: drop-shadow(0 0 10px var(--red)) hue-rotate(300deg);
        }

        /* Боевой UI */
        .hp-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center; }
        .hp-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--red), #ff7b7b); transition: 0.3s; }

        /* Меню навигации */
        .nav-menu { 
            display: flex; height: 80px; background: #000; 
            justify-content: space-around; align-items: center; padding-bottom: 20px;
        }
        .nav-btn { opacity: 0.5; text-align: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { opacity: 1; color: var(--neon); transform: translateY(-5px); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        /* Всплывающие окна */
        .modal { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        .btn-action { 
            background: var(--neon); color: #000; border: none; padding: 15px 40px; 
            border-radius: 12px; font-weight: 900; margin-top: 20px; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="res-item"><div class="dot" style="color: var(--gold); background: var(--gold);"></div> <span id="gold">0</span></div>
    <div class="res-item"><div class="dot" style="color: var(--neon); background: var(--neon);"></div> <span id="gems">0</span></div>
    <div class="res-item" style="color: var(--pink)">LVL: <span id="lvl">1</span></div>
</div>

<div id="world" onclick="handleTap()">
    <div class="hp-container">
        <div style="font-size: 10px; margin-bottom: 5px; letter-spacing: 2px;">ENEMY STATUS</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>
    
    <div id="player" class="entity"></div>
    <div id="enemies-container"></div>
</div>

<div class="nav-menu">
    <div class="nav-btn active" onclick="showTab('hero')"><span class="nav-icon">⚔️</span>ГЕРОЙ</div>
    <div class="nav-btn" onclick="showTab('forge')"><span class="nav-icon">🛠</span>КУЗНЯ</div>
    <div class="nav-btn" onclick="showTab('shop')"><span class="nav-icon">💎</span>МАГАЗИН</div>
    <div class="nav-btn" onclick="showTab('top')"><span class="nav-icon">🏆</span>ТОП</div>
</div>

<div id="shop-modal" class="modal">
    <h2 style="font-family: 'Orbitron'; color: var(--gold);">BLACK MARKET</h2>
    <p>Купить "Меч Неона" за 500 золота?</p>
    <button class="btn-action" onclick="buyItem()">КУПИТЬ</button>
    <button onclick="closeModals()" style="background:none; border:none; color:#666; margin-top:15px;">ЗАКРЫТЬ</button>
</div>

<script type="module">
    // Инициализация твоей базы данных Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://retsuo-default-rtdb.europe-west1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Состояние игры (Глобальные функции)
    window.gameState = {
        gold: 0, gems: 0, lvl: 1, 
        enemyHp: 100, enemyMaxHp: 100,
        playerDamage: 10,
        name: "Abdrakhman" // Имя из профиля
    };

    window.saveProgress = () => {
        set(ref(db, 'players/' + window.gameState.name), window.gameState);
    };

    window.loadProgress = async () => {
        const snapshot = await get(ref(db, 'players/' + window.gameState.name));
        if (snapshot.exists()) {
            window.gameState = snapshot.val();
            updateUI();
        }
    };
    
    window.loadProgress();
</script>

<script>
    function updateUI() {
        document.getElementById('gold').innerText = window.gameState.gold;
        document.getElementById('gems').innerText = window.gameState.gems;
        document.getElementById('lvl').innerText = window.gameState.lvl;
        const percent = (window.gameState.enemyHp / window.gameState.enemyMaxHp) * 100;
        document.getElementById('hp-fill').style.width = percent + "%";
    }

    function handleTap() {
        const p = document.getElementById('player');
        // Анимация удара
        p.style.transform = "translateX(30px) scale(1.1)";
        setTimeout(() => p.style.transform = "translateX(0) scale(1)", 100);

        // Урон врагу
        window.gameState.enemyHp -= window.gameState.playerDamage;
        
        if (window.gameState.enemyHp <= 0) {
            // Победа над врагом
            window.gameState.gold += 50 * window.gameState.lvl;
            window.gameState.lvl += 1;
            window.gameState.enemyMaxHp = Math.floor(100 * Math.pow(1.2, window.gameState.lvl));
            window.gameState.enemyHp = window.gameState.enemyMaxHp;
            
            // Сохраняем в Firebase при каждом уровне
            if(window.saveProgress) window.saveProgress();
            
            spawnEnemy();
        }
        updateUI();
    }

    function spawnEnemy() {
        const container = document.getElementById('enemies-container');
        container.innerHTML = '<div class="entity enemy" id="active-enemy" style="right: 50px;"></div>';
    }

    function showTab(type) {
        if(type === 'shop') document.getElementById('shop-modal').style.display = 'flex';
        // Логика переключения вкладок
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    function buyItem() {
        if(window.gameState.gold >= 500) {
            window.gameState.gold -= 500;
            window.gameState.playerDamage += 20;
            alert("Урон увеличен!");
            closeModals();
            updateUI();
            if(window.saveProgress) window.saveProgress();
        } else {
            alert("Недостаточно золота!");
        }
    }

    // Стартовый запуск
    spawnEnemy();
    updateUI();
</script>

</body>
</html>
