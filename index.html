<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RETSUO DASH INSANE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; filter: saturate(1.5) contrast(1.2); }
        #ui { position: fixed; top: 30px; width: 100%; display: flex; justify-content: center; z-index: 10; pointer-events: none; }
        .progress-bar { width: 60%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; position: relative; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #00f2ff; box-shadow: 0 0 10px #00f2ff; transition: width 0.1s; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; font-family: 'Orbitron'; }
        .play-btn { width: 100px; height: 100px; background: #00f2ff; border: none; border-radius: 20px; cursor: pointer; transform: rotate(45deg); box-shadow: 0 0 40px #00f2ff; }
        .play-btn:active { transform: rotate(45deg) scale(0.9); }
    </style>
</head>
<body>

<div id="ui"><div class="progress-bar"><div id="progress-fill"></div></div></div>
<div id="menu">
    <h1 style="color:white; letter-spacing:10px; margin-bottom:60px;">RETSUO DASH</h1>
    <button class="play-btn" onclick="start()"></button>
</div>
<canvas id="g"></canvas>

<script>
    const canvas = document.getElementById('g');
    const ctx = canvas.getContext('2d');
    const fill = document.getElementById('progress-fill');
    
    let active = false, frame = 0, score = 0;
    let speed = 9.5, gravity = 0.9, groundY = 150;
    
    const player = { x: 150, y: 0, w: 45, h: 45, dy: 0, angle: 0, targetAngle: 0, onGround: false, trail: [] };
    let obs = [], parts = [], decos = [];

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function jump() {
        if(player.onGround) {
            player.dy = -15; player.onGround = false;
            player.targetAngle += Math.PI/2;
            createExplosion(player.x + 22, player.y + 45, '#00f2ff');
        }
    }
    window.addEventListener('touchstart', (e) => { e.preventDefault(); if(active) jump(); });

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) parts.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, l: 1, c: color });
    }

    function start() {
        document.getElementById('menu').style.display = 'none';
        active = true; score = 0; obs = []; player.y = canvas.height - groundY - 45; player.dy = 0;
        loop();
    }

    function update() {
        player.dy += gravity; player.y += player.dy;
        const gLimit = canvas.height - groundY - player.h;
        if(player.y >= gLimit) { player.y = gLimit; player.dy = 0; player.onGround = true; player.angle = player.targetAngle; }
        else { player.angle += (player.targetAngle - player.angle) * 0.2; }

        // Шлейф
        player.trail.push({x: player.x, y: player.y, a: player.angle});
        if(player.trail.length > 8) player.trail.shift();

        // Препятствия
        if(frame % 60 === 0) obs.push({ x: canvas.width, w: 40, h: 45 });
        obs.forEach((o, i) => {
            o.x -= speed;
            if(player.x + 35 > o.x && player.x + 10 < o.x + o.w && player.y + 35 > canvas.height - groundY - o.h) reset();
            if(o.x < -100) { obs.splice(i,1); score++; fill.style.width = (score * 2) + '%'; }
        });

        parts.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.l -= 0.03; if(p.l <= 0) parts.splice(i,1); });
        frame++;
    }

    function draw() {
        // Фон с градиентом
        let g = ctx.createLinearGradient(0,0,0,canvas.height);
        g.addColorStop(0, '#0a001a'); g.addColorStop(1, '#001a1a');
        ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);

        // Рисуем пол (как в GD)
        ctx.fillStyle = '#000'; ctx.fillRect(0, canvas.height - groundY, canvas.width, groundY);
        ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 4;
        ctx.strokeRect(-10, canvas.height - groundY, canvas.width + 20, 2);

        // Шлейф
        player.trail.forEach((t, i) => {
            ctx.globalAlpha = i / 10; ctx.fillStyle = '#00f2ff';
            ctx.save(); ctx.translate(t.x + 22, t.y + 22); ctx.rotate(t.a);
            ctx.fillRect(-22, -22, 45, 45); ctx.restore();
        });
        ctx.globalAlpha = 1;

        // Игрок
        ctx.save(); ctx.translate(player.x + 22, player.y + 22); ctx.rotate(player.angle);
        ctx.fillStyle = '#00f2ff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
        ctx.fillRect(-22, -22, 45, 45);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(-15, -15, 30, 30);
        ctx.restore();

        // Шипы
        obs.forEach(o => {
            ctx.fillStyle = '#ff00de'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff00de';
            ctx.beginPath(); ctx.moveTo(o.x, canvas.height - groundY);
            ctx.lineTo(o.x + 20, canvas.height - groundY - 45); ctx.lineTo(o.x + 40, canvas.height - groundY);
            ctx.fill();
        });

        parts.forEach(p => { ctx.globalAlpha = p.l; ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    function reset() {
        active = false; createExplosion(player.x, player.y, '#ff00de');
        setTimeout(() => document.getElementById('menu').style.display = 'flex', 1000);
    }

    function loop() { if(active) { update(); draw(); requestAnimationFrame(loop); } }
</script>
</body>
</html>
