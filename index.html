<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Master Pro</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00de; }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            user-select: none;
            touch-action: none;
        }
        body {
            background: #000;
            color: #fff;
            font-family: system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .header { padding: 10px; text-align: center; width: 100%; }
        .score-box {
            display: flex; justify-content: space-around;
            font-weight: 900; font-size: 18px; text-shadow: 0 0 10px var(--neon);
        }
        #game-container {
            flex: 1; position: relative; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .canvas-wrapper {
            position: relative; height: 95%; aspect-ratio: 12 / 20;
            border: 2px solid #333; border-radius: 8px; background: #000;
        }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .start-btn {
            background: #ffd700; border: none; padding: 15px 40px;
            border-radius: 30px; font-size: 20px; font-weight: bold;
        }
        /* УПОРЯДОЧЕННЫЕ КНОПКИ */
        .controls {
            flex: 0 0 auto; display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(2, 80px);
            gap: 10px; padding-bottom: 30px; margin-top: 10px;
        }
        .btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: var(--neon);
        }
        .btn:active { background: rgba(0, 242, 255, 0.2); transform: scale(0.9); }
        .btn-rotate { border-color: var(--pink); color: var(--pink); grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div class="header">
    <div class="score-box">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="best">0</span></div>
    </div>
</div>

<div id="game-container">
    <div class="canvas-wrapper">
        <div id="overlay">
            <h2 style="color:var(--neon); margin-bottom:20px;">NEON MASTER</h2>
            <button class="start-btn" onpointerdown="startGame()">START</button>
        </div>
        <canvas id="tetris"></canvas>
    </div>
</div>

<div class="controls">
    <div class="btn btn-rotate" id="rotate-btn">↻</div>
    <div class="btn btn-left" id="left-btn">←</div>
    <div class="btn btn-down" id="down-btn">↓</div>
    <div class="btn btn-right" id="right-btn">→</div>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const bestElement = document.getElementById('best');
    const overlay = document.getElementById('overlay');

    canvas.width = 240; canvas.height = 400;
    context.scale(20, 20);

    let gameRunning = false;
    let score = 0;
    let best = localStorage.getItem('neon_best') || 0;
    bestElement.innerText = best;

    // СЕТКА
    function drawGrid() {
        context.strokeStyle = '#111'; 
        context.lineWidth = 0.05;
        for (let x = 0; x <= 12; x++) {
            context.beginPath(); context.moveTo(x, 0); context.lineTo(x, 20); context.stroke();
        }
        for (let y = 0; y <= 20; y++) {
            context.beginPath(); context.moveTo(0, y); context.lineTo(12, y); context.stroke();
        }
    }

    // ТУРБО
    let timers = {};
    function startTurbo(key, action) {
        if (!gameRunning) return;
        action();
        timers[key] = setTimeout(() => { timers[key] = setInterval(action, 80); }, 200);
    }
    function stopTurbo(key) { clearTimeout(timers[key]); clearInterval(timers[key]); delete timers[key]; }

    const bind = (id, key, action) => {
        const el = document.getElementById(id);
        el.addEventListener('pointerdown', (e) => { e.preventDefault(); startTurbo(key, action); });
        el.addEventListener('pointerup', () => stopTurbo(key));
        el.addEventListener('pointerleave', () => stopTurbo(key));
    };

    bind('left-btn', 'left', () => playerMove(-1));
    bind('right-btn', 'right', () => playerMove(1));
    bind('down-btn', 'down', () => playerDrop());
    document.getElementById('rotate-btn').onpointerdown = (e) => { e.preventDefault(); if(gameRunning) playerRotate(1); };

    // ЛОГИКА
    const colors = [null, '#00f2ff', '#ff00de', '#00ff00', '#ffff00', '#ff0000', '#7a00ff', '#ff7a00'];
    const arena = Array.from({length: 20}, () => new Array(12).fill(0));
    const player = { pos: {x: 0, y: 0}, matrix: null };

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'T') return [[0,0,0],[7,7,7],[0,7,0]];
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            gameRunning = false; overlay.style.display = 'flex';
            if (score > best) { best = score; localStorage.setItem('neon_best', best); bestElement.innerText = best; }
        }
    }

    function collide(a, p) {
        const [m, o] = [p.matrix, p.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            player.matrix.forEach((row, y) => {
                row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; });
            });
            playerReset(); arenaSweep();
        }
        dropCounter = 0;
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
            arena.splice(y, 1); arena.unshift(new Array(12).fill(0));
            score += 10; y++;
        }
        scoreElement.innerText = score;
    }

    function playerRotate(dir) {
        const pos = player.pos.x; let offset = 1;
        const m = player.matrix;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < y; ++x) { [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; }
        }
        m.forEach(row => row.reverse());
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > m[0].length) { player.pos.x = pos; return; }
        }
    }

    function playerMove(dir) { player.pos.x += dir; if (collide(arena, player)) player.pos.x -= dir; }

    let dropCounter = 0, dropInterval = 800, lastTime = 0;

    function startGame() {
        arena.forEach(row => row.fill(0));
        score = 0; scoreElement.innerText = '0';
        overlay.style.display = 'none';
        gameRunning = true; playerReset(); update();
    }

    function update(time = 0) {
        if (!gameRunning) return;
        const deltaTime = time - lastTime; lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);
        
        drawGrid(); // Рисуем сетку
        
        arena.forEach((row, y) => row.forEach((v, x) => {
            if (v) { context.fillStyle = colors[v]; context.fillRect(x, y, 1, 1); }
        }));
        player.matrix.forEach((row, y) => row.forEach((v, x) => {
            if (v) { context.fillStyle = colors[v]; context.fillRect(x + player.pos.x, y + player.pos.y, 1, 1); }
        }));
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
