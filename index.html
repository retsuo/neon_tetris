<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Brick Master Pro</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00de; --gold: #ffd700; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        /* Шапка с кнопкой ТОП */
        .header { width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .rank-btn { border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; border-radius: 8px; font-size: 12px; text-transform: uppercase; }
        .score-box { text-align: right; font-weight: 900; }

        /* Игровое поле с сеткой */
        #game-container { position: relative; width: 260px; height: 440px; border: 2px solid #222; border-radius: 12px; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .grid-bg { position: absolute; inset: 0; background-size: 26px 22px; background-image: linear-gradient(to right, #111 1px, transparent 1px), linear-gradient(to bottom, #111 1px, transparent 1px); pointer-events: none; }
        canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 5; }

        /* Оверлей и поле ввода (удаляется после первого раза) */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border-radius: 10px; }
        input { background: #111; border: 2px solid var(--neon); border-radius: 10px; color: #fff; padding: 12px; width: 80%; text-align: center; font-size: 18px; margin-bottom: 20px; }
        .btn-main { background: var(--gold); border: none; padding: 15px 40px; border-radius: 30px; font-weight: 900; font-size: 18px; color: #000; box-shadow: 0 5px 15px rgba(255,215,0,0.3); }

        /* Модальное окно ТОП */
        #top-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { width: 85%; background: #111; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; }
        .leader-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }

        /* ГРАМОТНОЕ УПРАВЛЕНИЕ (ПОДНЯТО ВЫШЕ) */
        .controls-wrapper { width: 100%; padding-bottom: 40px; margin-top: auto; display: flex; justify-content: center; }
        .joy-grid { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 15px; }
        .btn-joy { background: #1a1a1a; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; transition: 0.1s; box-shadow: 0 4px 0 #000; }
        .btn-joy:active { transform: translateY(4px); box-shadow: 0 0 0 #000; border-color: var(--neon); color: var(--neon); }
        
        .btn-rot { grid-column: 2; border-color: var(--pink); color: var(--pink); }
        .btn-l { grid-row: 2; grid-column: 1; }
        .btn-d { grid-row: 2; grid-column: 2; }
        .btn-r { grid-row: 2; grid-column: 3; }
    </style>
</head>
<body>

<div class="header">
    <div class="rank-btn" id="show-top">Ranking</div>
    <div class="score-box">
        <div style="font-size: 10px; color: #888;">PTS / BEST</div>
        <span id="ui-score">0</span> / <span id="ui-best" style="color:var(--gold)">0</span>
    </div>
</div>

<div id="game-container">
    <div class="grid-bg"></div>
    <div id="overlay" class="overlay">
        <h1 style="color:var(--neon); margin:0 0 15px;">NEON MASTER</h1>
        <div id="name-box">
            <input type="text" id="nick-input" placeholder="Введите ник" maxlength="10">
        </div>
        <button class="btn-main" id="start-btn">ИГРАТЬ</button>
    </div>
    <canvas id="game"></canvas>
</div>

<div id="top-modal">
    <div class="modal-content">
        <h2 style="color:var(--neon); text-align:center; margin-top:0;">TOP 10</h2>
        <div id="leader-list"></div>
        <button class="btn-main" style="width:100%; margin-top:15px; padding:10px;" onclick="document.getElementById('top-modal').style.display='none'">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="controls-wrapper">
    <div class="joy-grid">
        <div class="btn-joy btn-rot" id="m-rot">↻</div>
        <div class="btn-joy btn-l" id="m-l">←</div>
        <div class="btn-joy btn-d" id="m-d">↓</div>
        <div class="btn-joy btn-r" id="m-r">→</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAiEnX5enxq-1PX3smDt0pguY7AqFLUB4I",
        databaseURL: "https://retsuo-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "retsuo"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveToDb = (n, s) => { set(ref(db, 'leaderboard/' + n), { score: s }); };

    onValue(query(ref(db, 'leaderboard'), orderByChild('score'), limitToLast(10)), (snap) => {
        const list = document.getElementById('leader-list');
        list.innerHTML = "";
        let data = [];
        snap.forEach(c => { data.push({n: c.key, s: c.val().score}); });
        data.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="leader-item"><span>${i+1}. ${p.n}</span><b>${p.s}</b></div>`;
        });
    });
</script>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const ROWS = 20, COLS = 12, BLOCK = 20; 
    canvas.width = 240; canvas.height = 400; // фиксируем размер под контейнер
    ctx.scale(20, 20);

    let arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    const colors = [null, '#00f2ff', '#ff00de', '#00ff00', '#ffff00', '#ff0000', '#7a00ff', '#ff7a00'];
    let score = 0, best = 0, active = false, myName = localStorage.getItem('neon_nick') || "";

    if (myName) document.getElementById('name-box').remove();

    document.getElementById('show-top').onclick = () => document.getElementById('top-modal').style.display = 'flex';

    document.getElementById('start-btn').onclick = () => {
        if (!myName) {
            const v = document.getElementById('nick-input').value.trim();
            if (!v) return;
            myName = v;
            localStorage.setItem('neon_nick', myName);
            document.getElementById('name-box').remove();
        }
        arena.forEach(r => r.fill(0));
        score = 0; document.getElementById('ui-score').innerText = "0";
        document.getElementById('overlay').style.display = 'none';
        active = true; resetPiece(); update();
    };

    const piece = { pos: {x: 0, y: 0}, matrix: null };

    function createPiece(t) {
        if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (t === 'T') return [[0,2,0],[2,2,2],[0,0,0]];
        if (t === 'O') return [[3,3],[3,3]];
        if (t === 'L') return [[0,4,0],[0,4,0],[0,4,4]];
        if (t === 'J') return [[0,5,0],[0,5,0],[5,5,0]];
        if (t === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        return [[7,7,0],[0,7,7],[0,0,0]];
    }

    function collide(a, p) {
        const [m, o] = [p.matrix, p.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function resetPiece() {
        const p = 'ILJOTSZ';
        piece.matrix = createPiece(p[Math.floor(Math.random() * p.length)]);
        piece.pos = { x: 4, y: 0 };
        if (collide(arena, piece)) {
            active = false;
            if (score > best) { best = score; document.getElementById('ui-best').innerText = best; }
            document.getElementById('overlay').style.display = 'flex';
            if (window.saveToDb) window.saveToDb(myName, score);
        }
    }

    function merge(a, p) {
        p.matrix.forEach((row, y) => {
            row.forEach((v, x) => { if (v) a[y + p.pos.y][x + p.pos.x] = v; });
        });
    }

    function sweep() {
        outer: for (let y = ROWS - 1; y >= 0; --y) {
            for (let x = 0; x < COLS; ++x) { if (arena[y][x] === 0) continue outer; }
            arena.splice(y, 1); arena.unshift(Array(COLS).fill(0));
            score += 100;
        }
        document.getElementById('ui-score').innerText = score;
    }

    let lastTime = 0, dropCounter = 0;
    function update(time = 0) {
        if (!active) return;
        const dt = time - lastTime; lastTime = time;
        dropCounter += dt;
        if (dropCounter > 800) { 
            piece.pos.y++;
            if (collide(arena, piece)) { piece.pos.y--; merge(arena, piece); sweep(); resetPiece(); }
            dropCounter = 0;
        }
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, COLS, ROWS);
        const drawM = (m, o, light) => {
            m.forEach((r, y) => r.forEach((v, x) => {
                if (v) {
                    ctx.fillStyle = colors[v];
                    if (light) { ctx.shadowBlur = 10; ctx.shadowColor = colors[v]; }
                    ctx.fillRect(x + o.x + 0.05, y + o.y + 0.05, 0.9, 0.9);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(x + o.x + 0.1, y + o.y + 0.1, 0.3, 0.1);
                }
            }));
        };
        drawM(arena, {x:0,y:0}, false);
        drawM(piece.matrix, piece.pos, true);
    }

    const control = (id, fn) => {
        const el = document.getElementById(id);
        let timer;
        const start = (e) => { e.preventDefault(); fn(); clearInterval(timer); timer = setInterval(fn, 100); };
        const stop = () => clearInterval(timer);
        el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
        el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop);
    };

    control('m-l', () => { piece.pos.x--; if(collide(arena, piece)) piece.pos.x++; });
    control('m-r', () => { piece.pos.x++; if(collide(arena, piece)) piece.pos.x--; });
    control('m-d', () => { piece.pos.y++; if(collide(arena, piece)) { piece.pos.y--; merge(arena, piece); sweep(); resetPiece(); }});
    document.getElementById('m-rot').onclick = () => {
        const m = piece.matrix;
        for (let y = 0; y < m.length; ++y) for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
        m.forEach(r => r.reverse());
        if (collide(arena, piece)) { m.forEach(r => r.reverse()); for (let y = 0; y < m.length; ++y) for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; }
    };
</script>
</body>
</html>
