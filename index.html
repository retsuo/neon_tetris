<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Troll Level Telegram</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --canvas-bg: #e0e0e0;
            --ui-text: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--ui-text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-wrapper {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            background-color: var(--canvas-bg);
            display: block;
            image-rendering: pixelated;
        }
        #header {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
            font-weight: bold;
            text-transform: uppercase;
        }
        /* Управление */
        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 15px;
            width: 100%;
            max-width: 360px;
            padding: 20px;
            box-sizing: border-box;
        }
        .btn {
            background: #333;
            color: white;
            border: 2px solid #444;
            border-radius: 15px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
            transition: transform 0.05s, background 0.1s;
            box-shadow: 0 5px 0 #1a1a1a;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a1a;
            background: #555;
        }
        .btn-jump { background: #2196F3; border-color: #1976D2; }

        /* Экран старта */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="header">
        <div>Уровень: <span id="lvl">1</span></div>
        <div style="color: #ff4444;">💀 <span id="deaths">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="canvas"></canvas>
        <div id="overlay">
            <h1 style="color: #ff4444; margin-bottom: 10px;">LEVEL DEVIL</h1>
            <p style="margin-bottom: 30px; font-size: 14px;">Будь готов к подставам...</p>
            <button id="start-button">ИГРАТЬ</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="leftBtn">⬅️</div>
        <div class="btn" id="rightBtn">➡️</div>
        <div class="btn btn-jump" id="jumpBtn">ПРЫЖОК</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const lvlNode = document.getElementById('lvl');
    const deathNode = document.getElementById('deaths');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-button');

    // Настройка размеров под экран
    const WIDTH = 360;
    const HEIGHT = 420;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    // Звуковой движок (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Состояние игры
    let state = {
        level: 0,
        deaths: 0,
        running: false,
        player: { x: 40, y: 300, w: 24, h: 24, vx: 0, vy: 0, grounded: false },
        input: { left: false, right: false, jump: false },
        activeLevel: null
    };

    // Объекты уровней
    const levels = [
        { // 1
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: []
        },
        { // 2: Фейковый пол
            platforms: [{x:0, y:380, w:120, h:40, t:'s'}, {x:120, y:380, w:120, h:40, t:'f'}, {x:240, y:380, w:120, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: []
        },
        { // 3: Падающий шип
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: [{x:160, y:-40, w:40, h:40, trigger: 100, t:'fall'}]
        },
        { // 4: Невидимый блок
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: [{x:150, y:350, w:40, h:30, t:'s'}],
            blocks: [{x:150, y:260, w:40, h:20, revealed: false}]
        },
        { // 5: Прыжок через пропасть (пол уезжает)
            platforms: [{x:0, y:380, w:100, h:40, t:'s'}, {x:260, y:380, w:100, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: [{x:0, y:410, w:360, h:10, t:'s'}]
        },
        { // 6: Шипы снизу вылетают
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: [{x:220, y:380, w:30, h:60, trigger: 180, t:'rise'}]
        },
        { // 7: Убегающий выход
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}],
            goal: {x:200, y:340, w:30, h:40, move: true},
            spikes: [{x:330, y:340, w:30, h:40, t:'s'}]
        },
        { // 8: Потолок опускается
            platforms: [{x:0, y:380, w:360, h:40, t:'s'}, {x:0, y:0, w:360, h:20, t:'moveY', vy: 0.5}],
            goal: {x:310, y:340, w:30, h:40},
            spikes: []
        },
        { // 9: Платформа-лифт, которая падает
            platforms: [{x:0, y:300, w:80, h:20, t:'s'}, {x:140, y:300, w:80, h:20, t:'fall'}, {x:280, y:200, w:80, h:20, t:'s'}],
            goal: {x:300, y:160, w:30, h:40},
            spikes: [{x:0, y:410, w:360, h:10, t:'s'}]
        },
        { // 10: Финальный хаос
            platforms: [{x:0, y:380, w:100, h:40, t:'s'}, {x:150, y:280, w:60, h:20, t:'f'}, {x:260, y:180, w:100, h:40, t:'s'}],
            goal: {x:310, y:140, w:30, h:40},
            spikes: [{x:0, y:410, w:360, h:10, t:'s'}, {x:280, y:-100, w:40, h:40, trigger: 240, t:'fall'}]
        }
    ];

    function initLevel(n) {
        if (n >= levels.length) {
            alert("ТЫ ВЫИГРАЛ!");
            state.level = 0; n = 0; state.deaths = 0;
        }
        state.activeLevel = JSON.parse(JSON.stringify(levels[n]));
        state.player.x = 40;
        state.player.y = 300;
        state.player.vx = 0;
        state.player.vy = 0;
        lvlNode.innerText = n + 1;
        deathNode.innerText = state.deaths;
    }

    // Управление (Мышь/Тач/Клавиатура)
    function handleInput(type, act) {
        const active = type === 'start';
        if (act === 'l') state.input.left = active;
        if (act === 'r') state.input.right = active;
        if (act === 'j') state.input.jump = active;
    }

    const bindBtn = (id, act) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput('start', act); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); handleInput('end', act); });
        el.addEventListener('mousedown', () => handleInput('start', act));
        el.addEventListener('mouseup', () => handleInput('end', act));
    };
    bindBtn('leftBtn', 'l'); bindBtn('rightBtn', 'r'); bindBtn('jumpBtn', 'j');

    window.addEventListener('keydown', e => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') state.input.left = true;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') state.input.right = true;
        if(e.code === 'Space' || e.code === 'ArrowUp') state.input.jump = true;
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') state.input.left = false;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') state.input.right = false;
        if(e.code === 'Space' || e.code === 'ArrowUp') state.input.jump = false;
    });

    function die() {
        playSound(150, 'sawtooth', 0.2);
        state.deaths++;
        initLevel(state.level);
    }

    function update() {
        if (!state.running) return;
        const p = state.player;
        
        // Горизонтальное движение
        if (state.input.left) p.vx = -4;
        else if (state.input.right) p.vx = 4;
        else p.vx = 0;

        // Прыжок
        if (state.input.jump && p.grounded) {
            p.vy = -9;
            p.grounded = false;
            playSound(440, 'square', 0.1);
        }

        p.vy += 0.5; // Гравитация
        p.x += p.vx;
        p.y += p.vy;

        p.grounded = false;

        // Коллизии с платформами
        state.activeLevel.platforms.forEach(pl => {
            if (pl.hidden) return;
            if (pl.t === 'moveY') pl.y += pl.vy;
            
            if (p.x < pl.x + pl.w && p.x + p.w > pl.x && p.y < pl.y + pl.h && p.y + p.h > pl.y) {
                if (pl.t === 'f') { pl.hidden = true; return; }
                if (pl.t === 'fall' && p.vy > 0) pl.falling = true;
                
                // Приземление
                if (p.vy > 0 && p.y + p.h - p.vy <= pl.y + 10) {
                    p.y = pl.y - p.h;
                    p.vy = 0;
                    p.grounded = true;
                }
            }
            if (pl.falling) pl.y += 5;
        });

        // Невидимые блоки
        if (state.activeLevel.blocks) {
            state.activeLevel.blocks.forEach(b => {
                if (p.x < b.x + b.w && p.x + p.w > b.x && p.y < b.y + b.h && p.y + b.h > b.y) {
                    b.revealed = true;
                    if (p.vy < 0) { p.y = b.y + b.h; p.vy = 0; }
                }
            });
        }

        // Ловушки
        state.activeLevel.spikes.forEach(s => {
            if (s.t === 'fall' && p.x > s.trigger) s.y += 8;
            if (s.t === 'rise' && p.x > s.trigger) s.y -= 4;
            if (p.x < s.x + s.w && p.x + p.w > s.x && p.y < s.y + s.h && p.y + p.h > s.y) die();
        });

        // Финиш
        const g = state.activeLevel.goal;
        if (g.move && p.x > g.x - 50) g.x += 4;
        if (p.x < g.x + g.w && p.x + p.w > g.x && p.y < g.y + g.h && p.y + p.h > g.y) {
            playSound(600, 'sine', 0.2);
            state.level++;
            initLevel(state.level);
        }

        if (p.y > HEIGHT) die();
    }

    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        
        // Сетка для стиля
        ctx.strokeStyle = '#d0d0d0';
        ctx.lineWidth = 1;
        for(let i=0; i<WIDTH; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,HEIGHT); ctx.stroke(); }
        for(let i=0; i<HEIGHT; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WIDTH,i); ctx.stroke(); }

        const l = state.activeLevel;
        if (!l) return;

        // Рисуем платформы
        ctx.fillStyle = '#444';
        l.platforms.forEach(pl => { if(!pl.hidden) ctx.fillRect(pl.x, pl.y, pl.w, pl.h); });

        // Блоки
        if(l.blocks) l.blocks.forEach(b => {
            if(b.revealed) { ctx.fillStyle = '#888'; ctx.fillRect(b.x, b.y, b.w, b.h); }
        });

        // Финиш
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(l.goal.x, l.goal.y, l.goal.w, l.goal.h);

        // Шипы
        ctx.fillStyle = '#ff3333';
        l.spikes.forEach(s => ctx.fillRect(s.x, s.y, s.w, s.h));

        // Игрок
        ctx.fillStyle = '#2196F3';
        ctx.shadowBlur = 10;
        ctx.shadowColor = 'rgba(33, 150, 243, 0.5)';
        ctx.fillRect(state.player.x, state.player.y, state.player.w, state.player.h);
        ctx.shadowBlur = 0;

        requestAnimationFrame(() => {
            update();
            draw();
        });
    }

    startBtn.addEventListener('click', () => {
        audioCtx.resume();
        overlay.style.display = 'none';
        state.running = true;
        initLevel(0);
        draw();
    });

    // Исправление для iOS/Telegram (клики)
    startBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        startBtn.click();
    });

</script>
</body>
</html>
