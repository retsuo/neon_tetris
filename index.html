<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Brick Master ULTRA</title>
    <style>
        :root {
            --neon-primary: #00f2ff;
            --neon-secondary: #ff00de;
            --bg-color: #020202;
        }
        body {
            background: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            padding: 20px 0;
            box-sizing: border-box;
        }
        #game-wrapper {
            position: relative;
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            background: #000;
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .header-panel { width: 100%; margin-bottom: 10px; text-align: center; }
        .league-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid var(--neon-primary);
            color: var(--neon-primary);
            text-transform: uppercase;
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }
        .stats-bar span { color: var(--neon-primary); }

        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 12px;
        }
        h1 { font-size: 32px; color: var(--neon-primary); text-shadow: 0 0 15px var(--neon-primary); margin: 0; }
        
        /* КНОПКА СТАРТ С ВЫСОКИМ ПРИОРИТЕТОМ */
        .start-btn {
            margin-top: 20px;
            padding: 15px 45px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
            z-index: 101;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .controls {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 30px 20px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: #fff;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn.side { border-color: var(--neon-secondary); color: var(--neon-secondary); }
        .btn.main { border-color: var(--neon-primary); color: var(--neon-primary); }
        .btn:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="header-panel">
        <span class="league-badge" id="league">League: Bronze</span>
        <div class="stats-bar">
            <div>SCORE: <span id="score">0</span></div>
            <div>BEST: <span id="best">0</span></div>
        </div>
    </div>

    <div id="game-container" style="position: relative;">
        <div id="menu-overlay">
            <h1>NEON MASTER</h1>
            <p id="final-msg" style="margin: 10px 0; color: #aaa;"></p>
            <button class="start-btn" id="start-button">START</button>
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>
</div>

<div class="controls">
    <div class="btn side" id="left-btn">←</div>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <div class="btn main" id="rotate-btn">↻</div>
        <div class="btn main" id="down-btn">↓</div>
    </div>
