<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Troll Devil Pro: 10 Levels</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #game-ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; font-size: 18px; font-weight: bold; z-index: 10; pointer-events: none;
        }
        .controls {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; z-index: 20;
        }
        .btn {
            width: 75px; height: 75px; background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.4); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: white; user-select: none; touch-action: none;
        }
        .btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
        .btn-jump { background: #2196F3; width: 100px; border-radius: 20px; }
    </style>
</head>
<body>

<div id="game-ui">УРОВЕНЬ: <span id="lvl">1</span> | СМЕРТЕЙ: <span id="deaths">0</span></div>
<div id="game-container"></div>

<div class="controls">
    <div style="display: flex; gap: 15px;">
        <div class="btn" id="left">⬅️</div>
        <div class="btn" id="right">➡️</div>
    </div>
    <div class="btn btn-jump" id="jump">ПРЫЖОК</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 500,
        parent: 'game-container',
        physics: { default: 'arcade', arcade: { gravity: { y: 1300 } } },
        scene: { preload: preload, create: create, update: update }
    };

    let player, platforms, spikes, goals, movingPlats;
    let curLvl = 0;
    let deathCount = 0;
    let inputs = { left: false, right: false, jump: false };
    const game = new Phaser.Game(config);

    // ДАННЫЕ 10 УРОВНЕЙ
    const levels = [
        { name: "Начало", p: [40, 400], exit: [320, 430], plats: [[180, 480, 400]], spk: [] },
        { name: "Провал", p: [40, 400], exit: [320, 430], plats: [[60, 480, 120], [300, 480, 120]], spk: [] },
        { name: "Шипы", p: [40, 400], exit: [320, 430], plats: [[180, 480, 400]], spk: [[180, 450]] },
        { name: "Прыжок веры", p: [40, 100], exit: [320, 430], plats: [[50, 150, 100], [310, 480, 100]], spk: [[180, 490, 360]] },
        { name: "Тролль-блок", p: [40, 400], exit: [320, 430], plats: [[180, 480, 400]], spk: [[150, 450]], hidden: [[150, 300, 40]] },
        { name: "Лифт", p: [40, 400], exit: [320, 150], plats: [[50, 480, 100], [310, 200, 100]], moving: [[180, 400, 80]] },
        { name: "Лестница", p: [40, 450], exit: [320, 50], plats: [[50, 480, 80], [150, 350, 80], [250, 220, 80], [320, 100, 80]], spk: [[150, 310]] },
        { name: "Узкий путь", p: [20, 450], exit: [330, 450], plats: [[180, 490, 400]], spk: [[100, 450], [150, 450], [200, 450], [250, 450]] },
        { name: "Падение", p: [180, 20], exit: [180, 430], plats: [[180, 480, 100], [180, 80, 100]], spk: [[50, 490, 200], [310, 490, 200]], trap: 'gravity' },
        { name: "ФИНАЛ", p: [30, 400], exit: [330, 430], plats: [[50, 480, 80], [310, 480, 120]], moving: [[180, 300, 60]], spk: [[180, 490, 360], [310, 440]] }
    ];

    function preload() {
        const g = this.make.graphics();
        // Игрок
        g.fillStyle(0x2196F3).fillRect(0,0,24,24).generateTexture('player', 24,24);
        // Блок
        g.clear().fillStyle(0x444444).fillRect(0,0,100,40).generateTexture('base', 100,40);
        // Шип
        g.clear().fillStyle(0xff3333).fillTriangle(12,0, 0,24, 24,24).generateTexture('spike', 24,24);
        // Выход
        g.clear().fillStyle(0x4CAF50).fillRect(0,0,32,48).generateTexture('door', 32,48);
    }

    function create() {
        setupScene.call(this);
        setupControls();
    }

    function setupScene() {
        const data = levels[curLvl];
        document.getElementById('lvl').innerText = curLvl + 1;

        platforms = this.physics.add.staticGroup();
        spikes = this.physics.add.staticGroup();
        movingPlats = this.physics.add.group({ allowGravity: false, immovable: true });

        // Создание платформ
        data.plats.forEach(p => platforms.create(p[0], p[1], 'base').setDisplaySize(p[2], 40).refreshBody());
        
        // Создание шипов
        data.spk.forEach(s => {
            let spike = spikes.create(s[0], s[1], 'spike');
            if(s[2]) spike.setDisplaySize(s[2], 24).refreshBody();
        });

        // Движущиеся платформы
        if(data.moving) {
            data.moving.forEach(m => {
                let mp = movingPlats.create(m[0], m[1], 'base').setDisplaySize(m[2], 20);
                this.tweens.add({ targets: mp, y: mp.y - 150, duration: 2000, yoyo: true, repeat: -1 });
            });
        }

        // Выход
        goals = this.physics.add.sprite(data.exit[0], data.exit[1], 'door');
        
        // Игрок
        player = this.physics.add.sprite(data.p[0], data.p[1], 'player');
        player.setCollideWorldBounds(true);

        // Коллизии
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(player, movingPlats);
        this.physics.add.overlap(player, spikes, () => reset.call(this, true));
        this.physics.add.overlap(player, goals, () => {
            curLvl++;
            if(curLvl >= levels.length) { alert("ВЫ ПРОШЛИ ИГРУ!"); curLvl = 0; deathCount = 0; }
            reset.call(this, false);
        });

        this.cameras.main.fadeIn(300);
    }

    function reset(isDeath) {
        if(isDeath) {
            deathCount++;
            document.getElementById('deaths').innerText = deathCount;
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
            this.cameras.main.shake(100, 0.01);
        } else {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }
        this.scene.restart();
    }

    function update() {
        if(!player.active) return;
        if(inputs.left) player.setVelocityX(-180);
        else if(inputs.right) player.setVelocityX(180);
        else player.setVelocityX(0);

        if(inputs.jump && player.body.touching.down) {
            player.setVelocityY(-580);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }
    }

    function setupControls() {
        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); inputs[k] = true; };
            el.onpointerup = el.onpointerout = (e) => { e.preventDefault(); inputs[k] = false; };
        };
        bind('left', 'left'); bind('right', 'right'); bind('jump', 'jump');
    }
</script>
</body>
</html>
