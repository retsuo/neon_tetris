<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Master: Elite League</title>
    <style>
        :root { 
            --neon: #00f2ff; --pink: #ff00de; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            user-select: none; touch-action: none;
        }
        body {
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* ЛИГИ */
        .league-info {
            margin-top: 10px; padding: 5px 25px; border-radius: 20px;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            border: 2px solid var(--bronze); color: var(--bronze);
            box-shadow: 0 0 10px rgba(205, 127, 50, 0.2);
        }

        .stats {
            width: 100%; display: flex; justify-content: space-around;
            padding: 15px; font-size: 18px; font-weight: 800;
        }

        #main-view {
            flex: 1; display: flex; align-items: center; justify-content: center;
            gap: 15px; width: 95%;
        }

        /* ТВОЁ ПОЛЕ */
        .player-area {
            position: relative; height: 85%; aspect-ratio: 12 / 20;
            border: 3px solid #222; border-radius: 15px; background: #050505;
        }

        /* ПОЛЕ ПРИЗРАКА */
        .ghost-area {
            height: 45%; aspect-ratio: 12 / 20;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            opacity: 0.5; position: relative;
        }
        .ghost-tag {
            position: absolute; top: -25px; width: 100%; text-align: center;
            font-size: 10px; color: var(--pink); letter-spacing: 1px;
        }

        canvas { width: 100%; height: 100%; display: block; border-radius: inherit; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; border-radius: 12px;
        }

        .start-btn {
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            border: none; padding: 20px 50px; border-radius: 50px;
            font-size: 24px; font-weight: 900; color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .joy {
            display: grid; grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(2, 85px); gap: 15px; padding-bottom: 40px;
        }
        .circle-btn {
            background: #111; border: 2px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: #fff; transition: 0.1s;
        }
        .circle-btn:active { transform: scale(0.9); border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }
        .rotate { border-color: var(--pink); color: var(--pink); grid-column: 2; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div class="league-info" id="league-tag">Bronze League</div>

<div class="stats">
    <div style="color: var(--neon)">PTS: <span id="score">0</span></div>
    <div style="color: var(--gold)">BEST: <span id="best">0</span></div>
</div>

<div id="main-view">
    <div class="player-area">
        <div id="overlay">
            <h1 style="color:var(--neon); margin-bottom:40px;">NEON MASTER</h1>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>
        <canvas id="game"></canvas>
    </div>

    <div class="ghost-area">
        <div class="ghost-tag">LIVE OPPONENT</div>
        <canvas id="ghost"></canvas>
    </div>
</div>

<div class="joy">
    <div class="circle-btn rotate" id="btn-up">↻</div>
    <div class="circle-btn left" id="btn-left">←</div>
    <div class="circle-btn down" id="btn-down">↓</div>
    <div class="circle-btn right" id="btn-right">→</div>
</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gCanvas = document.getElementById('ghost');
    const gCtx = gCanvas.getContext('2d');

    [canvas, gCanvas].forEach(c => { c.width = 240; c.height = 400; });
    ctx.scale(20, 20); gCtx.scale(20, 20);

    const colors = [null, '#00f2ff', '#ff00de', '#00ff00', '#ffff00', '#ff0000', '#7a00ff', '#ff7a00'];
    let score = 0;
    let gameActive = false;
    let best = localStorage.getItem('neon_v4_best') || 0;
    document.getElementById('best').innerText = best;

    // Отрисовка "Плотного" блока
    function drawBlock(c, x, y, colorIdx, isGhost = false) {
        const color = colors[colorIdx];
        c.fillStyle = color;
        // Основной квадрат
        c.fillRect(x + 0.05, y + 0.05, 0.9, 0.9);
        
        if (!isGhost) {
            // Внутренний свет
            c.fillStyle = 'rgba(255,255,255,0.2)';
            c.fillRect(x + 0.15, y + 0.15, 0.6, 0.1);
            // Внешняя рамка
            c.strokeStyle = 'rgba(0,0,0,0.5)';
            c.lineWidth = 0.05;
            c.strokeRect(x + 0.05, y + 0.05, 0.9, 0.9);
        }
    }

    function drawGrid(c) {
        c.strokeStyle = '#111';
        c.lineWidth = 0.05;
        for(let i=0; i<=12; i++) { c.beginPath(); c.moveTo(i,0); c.lineTo(i,20); c.stroke(); }
        for(let i=0; i<=20; i++) { c.beginPath(); c.moveTo(0,i); c.lineTo(12,i); c.stroke(); }
    }

    const arena = Array.from({length: 20}, () => new Array(12).fill(0));
    const player = { pos: {x: 0, y: 0}, matrix: null };

    // Управление
    let moveLeft = false, moveRight = false, moveDown = false;
    let timers = {};

    function setupControl(id, action) {
        const el = document.getElementById(id);
        el.onpointerdown = (e) => {
            e.preventDefault();
            if(!gameActive) return;
            action();
            timers[id] = setInterval(action, 80);
        };
        el.onpointerup = el.onpointerleave = () => clearInterval(timers[id]);
    }

    setupControl('btn-left', () => { player.pos.x--; if(collide(arena, player)) player.pos.x++; });
    setupControl('btn-right', () => { player.pos.x++; if(collide(arena, player)) player.pos.x--; });
    setupControl('btn-down', () => playerDrop());
    document.getElementById('btn-up').onpointerdown = (e) => {
        e.preventDefault();
        if(gameActive) playerRotate();
    };

    function createPiece(t) {
        if (t === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (t === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (t === 'O') return [[4,4],[4,4]];
        if (t === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        return [[5,5,0],[0,5,5],[0,0,0]];
    }

    function collide(a, p) {
        const [m, o] = [p.matrix, p.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (a[y + o.y] && a[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            player.matrix.forEach((row, y) => {
                row.forEach((v, x) => { if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v; });
            });
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function arenaSweep() {
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) { if (arena[y][x] === 0) continue outer; }
            arena.splice(y, 1); arena.unshift(new Array(12).fill(0));
            score += 100; y++;
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        const tag = document.getElementById('league-tag');
        if(score > 2000) { tag.innerText = "Gold League"; tag.style.borderColor = "#ffd700"; tag.style.color = "#ffd700"; }
        else if(score > 1000) { tag.innerText = "Silver League"; tag.style.borderColor = "#c0c0c0"; tag.style.color = "#c0c0c0"; }
        if(score > best) { best = score; localStorage.setItem('neon_v4_best', best); document.getElementById('best').innerText = best; }
    }

    function playerRotate() {
        const m = player.matrix;
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < y; ++x) { [m[x][y], m[y][x]] = [m[y][x], m[x][y]]; }
        }
        m.forEach(row => row.reverse());
    }

    function playerReset() {
        const p = 'ILOTZ';
        player.matrix = createPiece(p[Math.floor(Math.random()*p.length)]);
        player.pos.y = 0;
        player.pos.x = 4;
        if(collide(arena, player)) { gameActive = false; document.getElementById('overlay').style.display = 'flex'; }
    }

    let dropCounter = 0, lastTime = 0;
    function update(time = 0) {
        if(!gameActive) return;
        const dt = time - lastTime; lastTime = time;
        dropCounter += dt;
        if(dropCounter > 800) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,240,400);
        drawGrid(ctx);
        arena.forEach((row, y) => row.forEach((v, x) => { if(v) drawBlock(ctx, x, y, v); }));
        player.matrix.forEach((row, y) => row.forEach((v, x) => { if(v) drawBlock(ctx, x + player.pos.x, y + player.pos.y, v); }));

        // Отрисовка призрака
        gCtx.fillStyle = '#050505'; gCtx.fillRect(0,0,240,400);
        drawGrid(gCtx);
        if(Math.random() > 0.9) { // Имитация жизни оппонента
            gCtx.fillStyle = 'rgba(255,0,222,0.3)';
            gCtx.fillRect(Math.floor(Math.random()*12), Math.floor(Math.random()*20), 1, 1);
        }
    }

    function startGame() {
        arena.forEach(r => r.fill(0));
        score = 0; updateUI();
        document.getElementById('overlay').style.display = 'none';
        gameActive = true; playerReset(); update();
    }
</script>
</body>
</html>
