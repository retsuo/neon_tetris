<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Brick Master PRO</title>
    <style>
        :root {
            --neon-color: #00f2ff;
            --bg-color: #050505;
        }
        body {
            background: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        #game-wrapper {
            position: relative;
            width: 300px;
            text-align: center;
        }
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 15px;
            border: 2px solid var(--neon-color);
        }
        .league-badge {
            font-size: 14px;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 242, 255, 0.2);
            border: 1px solid var(--neon-color);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        canvas {
            background: #000;
            border: 3px solid #111;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: var(--neon-color);
            text-shadow: 0 0 10px var(--neon-color);
        }
        .controls {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }
        .btn {
            height: 65px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--neon-color);
            border-radius: 15px;
            color: var(--neon-color);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn:active {
            background: var(--neon-color);
            color: #000;
            transform: scale(0.95);
        }
        .start-btn {
            padding: 15px 40px;
            background: var(--neon-color);
            color: #000;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-color);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="league-badge" id="league">League: Bronze</div>
    
    <div class="stats-bar">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="best">0</span></div>
    </div>

    <div id="game-container" style="position: relative;">
        <div id="menu-overlay">
            <h1 style="color: var(--neon-color); text-shadow: 0 0 15px var(--neon-color);">NEON MASTER</h1>
            <p id="final-msg" style="margin-bottom: 20px;"></p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>
        <canvas id="tetris" width="240" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="btn" style="grid-column: 2" onclick="playerRotate(1)">↻</div>
        <div class="btn" onclick="playerMove(-1)">←</div>
        <div class="btn" onclick="playerDrop()">↓</div>
        <div class="btn" onclick="playerMove(1)">→</div>
    </div>
</div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const bestElement = document.getElementById('best');
const leagueElement = document.getElementById('league');
const menu = document.getElementById('menu-overlay');

context.scale(20, 20);

let stats = JSON.parse(localStorage.getItem('tetris_pro_stats')) || { best: 0 };
bestElement.innerText = stats.best;

function updateLeague(score) {
    let league = "Bronze";
    if (score > 100) league = "Silver";
    if (score > 500) league = "Gold";
    if (score > 1000) league = "Diamond";
    if (score > 2500) league = "Elite";
    leagueElement.innerText = "League: " + league;
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 10;
        rowCount *= 2;
    }
    updateScore();
    updateLeague(player.score);
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function createPiece(type) {
    if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
    if (type === 'O') return [[2,2],[2,2]];
    if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
    if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
    if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
}

function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw Grid
    context.strokeStyle = '#111';
    context.lineWidth = 0.05;
    for(let i=0; i<20; i++) {
        context.beginPath(); context.moveTo(0, i); context.lineTo(12, i); context.stroke();
        context.beginPath(); context.moveTo(i, 0); context.lineTo(i, 20); context.stroke();
    }

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

const colors = [null, '#00f2ff', '#ff00ff', '#00ff00', '#ffff00', '#ff0000', '#7a00ff', '#ff7a00'];

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.shadowBlur = 8;
                context.shadowColor = colors[value];
                context.fillStyle = colors[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                context.shadowBlur = 0;
            }
        });
    });
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
        });
    });
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) player.pos.x -= dir;
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        gameOver();
    }
}

function gameOver() {
    if (player.score > stats.best) {
        stats.best = player.score;
        localStorage.setItem('tetris_pro_stats', JSON.stringify(stats));
        bestElement.innerText = stats.best;
    }
    document.getElementById('final-msg').innerText = "Game Over! Score: " + player.score;
    menu.style.display = 'flex';
    gameRunning = false;
}

function startGame() {
    arena.forEach(row => row.fill(0));
    player.score = 0;
    updateScore();
    updateLeague(0);
    menu.style.display = 'none';
    playerReset();
    gameRunning = true;
    update();
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
    }
    if (dir > 0) matrix.forEach(row => row.reverse());
    else matrix.reverse();
}

function updateScore() {
    scoreElement.innerText = player.score;
}

const arena = Array.from({length: 20}, () => new Array(12).fill(0));
const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

let dropCounter = 0;
let dropInterval = 800;
let lastTime = 0;
let gameRunning = false;

function update(time = 0) {
    if (!gameRunning) return;
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    draw();
    requestAnimationFrame(update);
}

updateScore();
</script>
</body>
</html>
