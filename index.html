<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber Quest: Evolution</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffd700; --panel: rgba(20, 20, 25, 0.95); }
        body { margin: 0; background: #050508; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Главный экран */
        #app { display: flex; flex-direction: column; height: 100vh; }
        
        /* Верхняя панель ресурсов */
        .top-bar { display: flex; justify-content: space-around; padding: 15px; background: var(--panel); border-bottom: 1px solid #333; }
        .res-item { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .res-icon { width: 20px; height: 20px; border-radius: 50%; }

        /* Игровая зона */
        #world { flex: 1; position: relative; background: url('https://img.freepik.com/free-photo/cyberpunk-city-street-night_23-2150772224.jpg') center/cover; }
        
        /* Персонаж (Placeholder) */
        .hero { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); width: 80px; height: 120px; 
                background: url('https://cdn-icons-png.flaticon.com/512/4333/4333609.png') no-repeat center/contain;
                filter: drop-shadow(0 0 10px var(--neon)); transition: 0.3s; }

        /* Нижнее меню навигации */
        .nav-menu { display: flex; justify-content: space-between; background: var(--panel); padding: 10px 20px 30px; border-top: 1px solid #444; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.6; font-size: 10px; gap: 5px; cursor: pointer; }
        .nav-btn.active { opacity: 1; color: var(--neon); }
        .nav-icon { font-size: 24px; }

        /* Окно диалога (как в Catizen) */
        .dialog-box { position: absolute; bottom: 120px; left: 10px; right: 10px; background: rgba(0,0,0,0.85); 
                      border: 2px solid var(--neon); border-radius: 15px; padding: 15px; display: none; z-index: 50; }
    </style>
</head>
<body>

<div id="app">
    <div class="top-bar">
        <div class="res-item"><div class="res-icon" style="background:var(--gold)"></div> <span id="gold">1000</span></div>
        <div class="res-item"><div class="res-icon" style="background:var(--neon)"></div> <span id="gems">50</span></div>
        <div class="res-item">LVL: <span id="lvl">1</span></div>
    </div>

    <div id="world">
        <div class="hero" id="player"></div>
        
        <div class="dialog-box" id="msg-box">
            <b style="color:var(--neon)">ИНСТРУКТОР:</b>
            <p id="msg-text">Добро пожаловать в Нео-Бишкек! Готов к первой миссии?</p>
            <button onclick="closeDialog()" style="background:var(--neon); border:none; padding:5px 15px; border-radius:5px;">OK</button>
        </div>
    </div>

    <div class="nav-menu">
        <div class="nav-btn active"><span class="nav-icon">⚔️</span>ГЕРОЙ</div>
        <div class="nav-btn"><span class="nav-icon">🛠</span>КУЗНЯ</div>
        <div class="nav-btn" onclick="openShop()"><span class="nav-icon">💎</span>МАГАЗИН</div>
        <div class="nav-btn"><span class="nav-icon">🏆</span>ТОП</div>
    </div>
</div>

<script>
    function openShop() {
        document.getElementById('msg-box').style.display = 'block';
        document.getElementById('msg-text').textContent = "Магазин временно закрыт на тех-обслуживание. Зайдите позже!";
    }
    
    function closeDialog() {
        document.getElementById('msg-box').style.display = 'none';
    }

    // Простая анимация персонажа "дыхание"
    setInterval(() => {
        const hero = document.getElementById('player');
        hero.style.bottom = hero.style.bottom === '105px' ? '100px' : '105px';
    }, 1000);
</script>
</body>
</html>
