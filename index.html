<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RETSUO DASH PRO</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: fixed; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-around; color: #00f2ff; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #00f2ff; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <div>BEST: <span id="best">0</span></div>
    <div>SCORE: <span id="score">0</span></div>
</div>
<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    let score = 0;
    let best = localStorage.getItem('dash_pro_best') || 0;
    bestEl.innerText = best;

    // Настройки
    const settings = {
        gravity: 0.8,
        jumpPower: -13,
        speed: 9,
        groundY: 100
    };

    const player = {
        x: 100, y: 0, w: 40, h: 40,
        dy: 0, angle: 0, onGround: false
    };

    let obstacles = [];
    let particles = [];
    let bgOffset = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - settings.groundY - player.h;
    }
    window.addEventListener('resize', resize);
    resize();

    // Прыжок
    window.addEventListener('touchstart', () => {
        if(player.onGround) {
            player.dy = settings.jumpPower;
            player.onGround = false;
        }
    });

    function createParticle(x, y) {
        particles.push({ x, y, size: Math.random() * 5, life: 1, dx: -2, dy: Math.random() * 2 - 1 });
    }

    function update() {
        // Фоновая сетка (Параллакс)
        bgOffset = (bgOffset - settings.speed * 0.3) % 100;

        // Физика
        player.dy += settings.gravity;
        player.y += player.dy;

        const groundLevel = canvas.height - settings.groundY - player.h;
        if (player.y >= groundLevel) {
            player.y = groundLevel;
            player.dy = 0;
            player.onGround = true;
            // Сглаживание угла при приземлении
            player.angle = Math.round(player.angle / (Math.PI/2)) * (Math.PI/2);
        } else {
            player.angle += 0.15; // Вращение в воздухе
        }

        // Спавн препятствий
        if (Math.random() < 0.02) {
            if (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 400) {
                obstacles.push({ x: canvas.width, w: 40, h: 40 });
            }
        }

        // Обновление частиц
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });

        if(player.onGround) createParticle(player.x, player.y + player.h);

        // Обновление препятствий
        obstacles.forEach((obs, i) => {
            obs.x -= settings.speed;
            if(obs.x < -100) {
                obstacles.splice(i, 1);
                score++;
                scoreEl.innerText = score;
            }

            // Коллизия
            if (player.x < obs.x + obs.w - 5 && player.x + player.w > obs.x + 5 &&
                player.y < canvas.height - settings.groundY - 5 && player.y + player.h > canvas.height - settings.groundY - obs.h + 5) {
                reset();
            }
        });
    }

    function draw() {
        ctx.fillStyle = '#050508';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Сетка фона
        ctx.strokeStyle = '#111';
        for(let x = bgOffset; x < canvas.width; x += 100) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }

        // Пол
        ctx.fillStyle = '#00f2ff';
        ctx.fillRect(0, canvas.height - settings.groundY, canvas.width, 2);

        // Частицы
        particles.forEach(p => {
            ctx.fillStyle = `rgba(0, 242, 255, ${p.life})`;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });

        // Игрок
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        ctx.rotate(player.angle);
        ctx.fillStyle = '#00f2ff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#00f2ff';
        ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.strokeRect(-player.w/2 + 5, -player.h/2 + 5, player.w - 10, player.h - 10);
        ctx.restore();

        // Препятствия (Шипы)
        ctx.shadowBlur = 10; ctx.shadowColor = '#ff00de';
        ctx.fillStyle = '#ff00de';
        obstacles.forEach(obs => {
            ctx.beginPath();
            ctx.moveTo(obs.x, canvas.height - settings.groundY);
            ctx.lineTo(obs.x + obs.w/2, canvas.height - settings.groundY - obs.h);
            ctx.lineTo(obs.x + obs.w, canvas.height - settings.groundY);
            ctx.fill();
        });
        ctx.shadowBlur = 0;
    }

    function reset() {
        if(score > best) {
            best = score;
            localStorage.setItem('dash_pro_best', best);
            bestEl.innerText = best;
        }
        score = 0;
        scoreEl.innerText = 0;
        obstacles = [];
        player.dy = 0;
        player.angle = 0;
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
